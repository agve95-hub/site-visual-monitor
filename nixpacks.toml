[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "npm run install:all",
  "python3.11 -m pip install playwright==1.44.0 pillow requests beautifulsoup4",
  "python3.11 -m playwright install chromium",
  "python3.11 -m playwright install-deps chromium"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node backend/server.js"
